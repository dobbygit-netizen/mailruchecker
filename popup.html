<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MailRU Checker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="img/16_activ.png" alt="icon">
      <span>MailRU Checker</span>
    </div>
    <span id="badge" class="badge">0</span>
  </div>

  <div id="accounts-list" class="accounts-list"></div>
  <div id="messages-list" class="messages-list"></div>

  <div class="controls">
    <button id="btn-add" class="btn primary">Добавить аккаунт</button>
    <button id="btn-refresh" class="btn secondary">Обновить</button>
    <button id="btn-mark-all" class="btn secondary">Прочитать всё</button>
  </div>

  <div class="footer">v0.0.4 • Manifest V3</div>

  <script src="popup.js"></script>
</body>
</html>
